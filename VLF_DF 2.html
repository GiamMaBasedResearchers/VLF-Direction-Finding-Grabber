<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VLF Direction Finding Grabber</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<style>
:root{--bg:#060a10;--card:#0b1018;--bdr:#152030;--acc:#00ff88;--cy:#00bbff;--or:#ff6b35;--rd:#ff3355;--tx:#c8d4e0;--mt:#4a5a6a;--dm:#2a3a4a}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--tx);font-family:'JetBrains Mono',monospace;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
.gc{background:var(--card);border:1px solid var(--bdr);border-radius:8px;overflow:visible;flex-shrink:0}
.gh{padding:4px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);background:rgba(0,255,136,.03)}
.sn{font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.sl{font-size:6px;color:var(--mt);margin-top:1px}
.db{font-size:6px;padding:1px 4px;border-radius:2px;font-weight:700}
.sw{position:relative;width:100%;cursor:crosshair;overflow:visible;background:#080d15;min-height:60px}
.sw img{width:100%;display:block}
.sw canvas.gov{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4}
.fm{position:absolute;height:2px;pointer-events:none;z-index:5;transition:top .15s}
.fm .fl{position:absolute;left:0;right:0;top:0;height:2px}
.fm .ft{position:absolute;left:2px;top:-12px;font-size:7px;padding:1px 3px;border-radius:2px;white-space:nowrap;background:rgba(6,10,16,.9)}
.sca{position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc),transparent);animation:sc 6s linear infinite;opacity:.06;pointer-events:none;z-index:2}
@keyframes sc{0%{top:0}100%{top:100%}}
.sig-circ{position:absolute;pointer-events:none;z-index:7;transform:translate(-50%,-50%);border-radius:50%;animation:scpulse 2s infinite}
.sig-circ-inner{position:absolute;top:50%;left:50%;width:3px;height:3px;border-radius:50%;transform:translate(-50%,-50%)}
@keyframes scpulse{0%,100%{box-shadow:0 0 4px currentColor,0 0 8px currentColor}50%{box-shadow:0 0 10px currentColor,0 0 24px currentColor}}
.tline{position:absolute;top:0;bottom:0;width:2px;pointer-events:none;z-index:5}
.tline-inner{position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%,var(--or) 15%,var(--or) 85%,transparent 100%);opacity:.65}
.tline-lbl{position:absolute;top:2px;left:4px;font-size:6px;padding:1px 3px;border-radius:2px;white-space:nowrap;background:rgba(6,10,16,.92);color:var(--or);font-weight:700}
#lens-box{position:fixed;pointer-events:none;z-index:9998;display:none}
#lens-cv{border-radius:50%;box-shadow:0 0 20px rgba(0,255,136,.15),0 0 2px rgba(0,255,136,.5);display:block}
#lens-panel{background:rgba(6,10,16,.96);border:1px solid var(--bdr);border-radius:6px;padding:5px 8px;margin-top:5px;backdrop-filter:blur(8px);min-width:170px}
.lens-row{display:flex;align-items:center;gap:4px;margin-top:2px}
.lens-sw{width:12px;height:12px;border-radius:2px;border:1px solid rgba(255,255,255,.25);display:inline-block;vertical-align:middle;flex-shrink:0}
.lens-lbl{font-size:6px;color:var(--mt);width:32px;flex-shrink:0}
.lens-val{font-size:8px;font-weight:700;vertical-align:middle}
.lens-hsv{font-size:7px;color:var(--mt);margin-top:1px}
.lens-freq{font-size:8px;color:var(--cy);margin-top:2px}
.lens-time{font-size:8px;color:var(--or);margin-top:1px}
.lens-rx{font-size:7px;font-weight:700;margin-top:2px;padding-top:2px;border-top:1px solid var(--bdr)}
.lens-hint{font-size:6px;color:var(--mt);margin-top:2px}
.gc2{padding:3px 6px;display:flex;align-items:center;gap:3px;flex-wrap:wrap;border-top:1px solid var(--bdr)}
.bi{background:var(--bg);border:1px solid var(--bdr);color:var(--tx);padding:1px 3px;border-radius:3px;font-family:inherit;font-size:9px;width:46px;text-align:center}
.bi:focus{outline:none;border-color:var(--acc)}
.bis{width:40px}
.cs{width:16px;height:16px;border-radius:3px;border:2px solid var(--bdr);cursor:pointer;padding:0;background:none}
.cs::-webkit-color-swatch-wrapper{padding:0}.cs::-webkit-color-swatch{border:none;border-radius:1px}
.lb{font-size:6px;color:var(--mt);text-transform:uppercase;letter-spacing:.3px}
.cm2{width:22px;height:22px;border-radius:50%;border:1px solid var(--bdr);position:relative;background:var(--bg);flex-shrink:0}
.cne{position:absolute;top:50%;left:50%;width:2px;height:7px;background:linear-gradient(to top,var(--rd),var(--acc));transform-origin:bottom center;border-radius:1px;margin-left:-1px;margin-top:-7px;transition:transform .4s}
.cce{position:absolute;top:50%;left:50%;width:2px;height:2px;background:var(--cy);border-radius:50%;transform:translate(-50%,-50%)}
.tb{padding:1px 4px;background:var(--bdr);color:var(--tx);border:1px solid var(--bdr);border-radius:2px;cursor:pointer;font-family:inherit;font-size:6px;font-weight:700;transition:all .15s}
.tb:hover{border-color:var(--acc);color:var(--acc)}
.tb.act{background:rgba(0,187,255,.2);color:var(--cy);border-color:var(--cy);animation:pls 1s infinite}
.tb.pxok{background:rgba(0,255,136,.15);color:var(--acc);border-color:var(--acc)}
.tb.rdact{background:rgba(255,51,85,.15);color:var(--rd);border-color:var(--rd)}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.5}}
.off-btn{padding:0 3px;background:var(--bg);border:1px solid var(--bdr);color:var(--tx);border-radius:2px;cursor:pointer;font-family:inherit;font-size:8px;font-weight:700;line-height:14px}
.off-btn:hover{border-color:var(--acc);color:var(--acc)}
#map2d{width:100%;height:100%;position:absolute;top:0;left:0;z-index:1}
#map3d{width:100%;height:100%;position:absolute;top:0;left:0;z-index:1;display:none}
.leaflet-container{background:#080d15!important;font-family:'JetBrains Mono',monospace!important}
.mbt{padding:4px 7px;background:rgba(12,18,25,.92);border:1px solid var(--bdr);color:var(--tx);border-radius:4px;cursor:pointer;font-family:inherit;font-size:8px;transition:all .2s;backdrop-filter:blur(6px)}
.mbt:hover{border-color:var(--acc);color:var(--acc)}.mbt.on{background:var(--acc);color:var(--bg);border-color:var(--acc);font-weight:700}
.tk{position:absolute;bottom:6px;left:6px;z-index:1000;background:rgba(12,18,25,.94);border:1px solid var(--bdr);border-radius:6px;padding:6px;width:260px;backdrop-filter:blur(10px);max-height:38%;overflow-y:auto}
.tk h3{font-family:'Orbitron',sans-serif;font-size:7px;font-weight:700;color:var(--acc);margin-bottom:4px;letter-spacing:1px}
.fi{background:var(--bg);border:1px solid var(--bdr);color:var(--tx);padding:2px 4px;border-radius:3px;font-family:inherit;font-size:9px;width:64px}
.fi:focus{outline:none;border-color:var(--acc)}
.abt{padding:2px 6px;background:var(--acc);color:var(--bg);border:none;border-radius:3px;cursor:pointer;font-family:inherit;font-size:7px;font-weight:700}
.abt:hover{background:#00cc6a}
.se{display:flex;align-items:center;gap:3px;padding:2px 0;border-bottom:1px solid rgba(22,32,48,.5);font-size:8px}
.se:last-child{border-bottom:none}
.rbt{color:var(--rd);cursor:pointer;font-size:9px;opacity:.5;transition:opacity .2s;background:none;border:none;padding:0 1px}
.rbt:hover{opacity:1}.sdt{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tc{position:fixed;bottom:8px;right:8px;z-index:9999;display:flex;flex-direction:column;gap:3px}
.tt{padding:3px 8px;border-radius:3px;font-size:8px;animation:ti .3s ease-out;max-width:340px}
.tt.i{background:rgba(0,187,255,.12);border:1px solid var(--cy);color:var(--cy)}
.tt.s{background:rgba(0,255,136,.12);border:1px solid var(--acc);color:var(--acc)}
.tt.e{background:rgba(255,51,85,.12);border:1px solid var(--rd);color:var(--rd)}
.tt.w{background:rgba(255,107,53,.12);border:1px solid var(--or);color:var(--or)}
@keyframes ti{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.pxd{display:inline-block;width:6px;height:6px;border-radius:50%;margin-left:2px;vertical-align:middle}
.pxd.on{background:var(--acc);box-shadow:0 0 4px var(--acc)}.pxd.off{background:var(--rd)}
.exp-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:99999;background:var(--card);border:2px solid var(--acc);border-radius:8px;overflow:hidden;box-shadow:0 0 30px rgba(0,255,136,.2);min-width:400px;max-width:90vw}
.exp-hdr{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:rgba(0,255,136,.1);cursor:pointer}
.exp-body{padding:10px;max-height:300px;overflow-y:auto;display:block}
.exp-body.collapsed{display:none}
</style>
</head>
<body>
<header style="height:36px;background:var(--card);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 10px">
<div style="display:flex;align-items:center;gap:6px"><i class="fas fa-satellite-dish" style="color:var(--acc);font-size:10px"></i><span style="font-family:'Orbitron',sans-serif;font-size:10px;font-weight:900;color:var(--acc);letter-spacing:2px">VLF DIRECTION FINDER</span></div>
<div style="display:flex;align-items:center;gap:6px">
<button class="mbt" id="bexport" style="font-size:7px;padding:2px 6px"><i class="fas fa-download"></i> EXPORT</button>
<button class="mbt" id="bpause" style="font-size:7px;padding:2px 6px"><i class="fas fa-pause"></i></button>
<span style="font-size:8px;color:var(--mt)"><i class="fas fa-sync-alt"></i> <span id="rtmr" style="color:var(--cy)">30s</span></span><span id="clk" style="font-size:8px;color:var(--acc)"></span></div>
</header>
<div style="display:grid;grid-template-columns:36% 64%;height:calc(100vh - 36px)">
<div id="lpnl" style="overflow-y:auto;padding:4px;display:flex;flex-direction:column;gap:4px">
<div class="gc" id="gc-nurnberg"></div>
<div class="gc" id="gc-amber4"></div>
<div class="gc" id="gc-amber10"></div>
</div>
<div style="position:relative;overflow:hidden;border-left:1px solid var(--bdr)">
<div style="position:absolute;top:6px;right:6px;z-index:1000;display:flex;flex-direction:column;gap:3px">
<button class="mbt on" id="b2d"><i class="fas fa-map"></i> 2D</button>
<button class="mbt" id="b3d"><i class="fas fa-globe"></i> 3D</button>
<button class="mbt" id="bclr"><i class="fas fa-eraser"></i> Clear</button>
</div>
<div class="tk"><h3><i class="fas fa-crosshairs" style="margin-right:3px"></i>SIGNAL TRACKER</h3>
<div style="display:flex;gap:3px;align-items:center;margin-bottom:4px;flex-wrap:wrap"><span class="lb">FREQ</span><input type="number" class="fi" id="freqIn" min="0" max="30000" placeholder="Hz"/><span style="font-size:6px;color:var(--mt)">Hz</span><button class="abt" id="addBtn"><i class="fas fa-plus"></i> DF</button></div>
<div id="sigList"><div style="color:var(--dm);font-size:7px;text-align:center;padding:2px">Click spectrogram for freq, compass for bearing</div></div>
</div>
<div id="map2d"></div><div id="map3d"></div>
</div></div>
<div id="lens-box"><canvas id="lens-cv" width="130" height="130"></canvas><div id="lens-panel"><div class="lens-row"><span class="lens-lbl">Pixel</span><div class="lens-sw" id="lsw-exact"></div><span class="lens-val" id="lrgb-exact">---</span></div><div class="lens-row"><span class="lens-lbl">Signal</span><div class="lens-sw" id="lsw-sig"></div><span class="lens-val" id="lrgb-sig" style="color:var(--mt)"></span></div><div class="lens-hsv" id="lhsv"></div><div class="lens-freq" id="lfreq"></div><div class="lens-time" id="ltime"></div><div class="lens-rx" id="lrx"></div><div class="lens-hint" id="lhint"></div></div></div>
<div class="tc" id="tstc"></div>
<div id="exp-box" class="exp-panel" style="display:none">
<div class="exp-hdr" id="exp-hdr"><span style="font-weight:700;color:var(--acc);font-size:9px"><i class="fas fa-cog"></i> CALIBRATION EXPORT</span><div style="display:flex;gap:4px"><button id="exp-toggle" style="background:none;border:none;color:var(--acc);cursor:pointer;font-size:12px"><i class="fas fa-chevron-up"></i></button><button id="exp-close" style="background:none;border:none;color:var(--rd);cursor:pointer;font-size:12px"><i class="fas fa-times"></i></button></div></div>
<div class="exp-body" id="exp-body"><textarea id="exp-txt" style="width:100%;height:220px;background:var(--bg);color:var(--tx);border:1px solid var(--bdr);border-radius:4px;padding:6px;font-family:JetBrains Mono;font-size:8px;resize:none"></textarea></div>
</div>

<script type="module">
import*as THREE from'three';
import{OrbitControls}from'three/addons/controls/OrbitControls.js';

/* ===== CONFIG ===== */
var nowT=new Date();
var yesterdayT=new Date(nowT.getTime()-86400000);

var RX={
  nurnberg:{name:'DF6NM Nurnberg',lat:49.452,lng:11.0767,url:'https://df6nm.de/vlf/vlfwide.jpg',fMin:5,fMax:30,df:360,accent:'#00ff88',spec:{l:0.06,t:0.1605,r:0.90,b:0.9654},scale:{x:0.92},cmp:{cx:0.95,cy:0.92,r:0.06},tcal:{x1:0.8562,t1:nowT,x2:0.0335,t2:yesterdayT},cmpOff:0},
  amber4:{name:'VLF-4 Amber',lat:49.4429,lng:11.8628,url:'https://vlf.u01.de/VLFgrabber/vlf4.jpg',fMin:1,fMax:30,df:360,accent:'#00bbff',spec:{l:0.06,t:0.0067,r:0.55,b:0.7914},scale:{x:0.57},cmp:{cx:0.95,cy:0.92,r:0.06},tcal:{x1:0.8267,t1:nowT,x2:0.0979,t2:yesterdayT},cmpOff:0},
  amber10:{name:'VLF-10 Amber',lat:49.45,lng:11.87,url:'https://vlf.u01.de/VLFgrabber/vlf10.jpg',fMin:5,fMax:30,df:180,accent:'#ff6b35',spec:{l:0.06,t:0.0043,r:0.55,b:0.5941},scale:{x:0.57},cmp:{cx:0.95,cy:0.92,r:0.06},tcal:{x1:0.8267,t1:nowT,x2:0.0998,t2:yesterdayT},cmpOff:0}
};
var REFRESH=30,BLEN=8000;
var sigs=[],sid=0,lmap=null,mLay={},mInt={},vw='2d';
var sc3,cam3,ren3,ctl3,gl3,gL={},g3ok=false,fmk={};
var localImgs={},imgLoadTime={},pxOk={},usesLocal={};
var compMode={},calMode={},tcalMode={},compassPeaks={},compassDebug={};
var autoCenterResult={};
var activeLensK=null;
var isPaused=false;
var $=function(id){return document.getElementById(id)};
function toast(m,t){var c=$('tstc'),d=document.createElement('div');d.className='tt '+(t||'i');d.textContent=m;c.appendChild(d);setTimeout(function(){d.style.opacity='0';d.style.transition='opacity .3s';setTimeout(function(){d.remove()},300)},5000)}
function tick(){$('clk').textContent=new Date().toUTCString().slice(17,25)+' UTC'}setInterval(tick,1000);tick();
function rgb2hsv(r,g,b){r/=255;g/=255;b/=255;var mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn,h=0;if(d>0){if(mx===r)h=((g-b)/d)%6;else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;h*=60;if(h<0)h+=360}return{h:h,s:mx===0?0:d/mx,v:mx}}
function hsv2rgbL(h,s,v){h=((h%360)+360)%360;s=Math.max(0,Math.min(1,s));v=Math.max(0,Math.min(1,v));var c=v*s,x=c*(1-Math.abs((h/60)%2-1)),m=v-c,r=0,g=0,b=0;if(h<60){r=c;g=x}else if(h<120){r=x;g=c}else if(h<180){g=c;b=x}else if(h<240){g=x;b=c}else if(h<300){r=x;b=c}else{r=c;b=x}return{r:Math.round((r+m)*255),g:Math.round((g+m)*255),b:Math.round((b+m)*255)}}
function hexToRgb(hex){return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)}}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(function(v){return v.toString(16).padStart(2,'0')}).join('')}
function yToFreq(k,yPct){var s=RX[k].spec;return RX[k].fMax-(yPct-s.t)/(s.b-s.t)*(RX[k].fMax-RX[k].fMin)}
function freqToY(k,freq){var s=RX[k].spec;return s.t+(RX[k].fMax-freq)/(RX[k].fMax-RX[k].fMin)*(s.b-s.t)}
function xToTime(k,xPct){var s=RX[k].spec;var relX=(xPct-s.l)/(s.r-s.l);var tc=RX[k].tcal;if(tc&&tc.x1!==undefined){return new Date(tc.t1.getTime()+((xPct-tc.x1)/(tc.x2-tc.x1))*(tc.t2.getTime()-tc.t1.getTime()))}var lt2=imgLoadTime[k];if(!lt2)return null;return new Date(lt2.getTime()-24*3600000+relX*24*3600000)}
function timeToX(k,time){var tc=RX[k].tcal;if(tc&&tc.x1!==undefined){var relX=(time.getTime()-tc.t1.getTime())/(tc.t2.getTime()-tc.t1.getTime());return tc.x1+relX*(tc.x2-tc.x1)}var lt2=imgLoadTime[k];if(!lt2)return null;var eT=lt2.getTime(),sT=eT-24*3600000;return RX[k].spec.l+(time-sT)/(eT-sT)*(RX[k].spec.r-RX[k].spec.l)}
function fmtTime(d){return d?d.toISOString().slice(11,19)+' UTC':''}

/* ===== BULK PIXEL READ HELPERS ===== */
var autoCenterCache={};
function readRegion(ctx,rx0,ry0,rw,rh){rx0=Math.max(0,Math.floor(rx0));ry0=Math.max(0,Math.floor(ry0));if(rx0>=ctx.canvas.width||ry0>=ctx.canvas.height)return null;rw=Math.max(1,Math.min(Math.ceil(rw),ctx.canvas.width-rx0));rh=Math.max(1,Math.min(Math.ceil(rh),ctx.canvas.height-ry0));if(rw<=0||rh<=0)return null;return{d:ctx.getImageData(rx0,ry0,rw,rh).data,x0:rx0,y0:ry0,w:rw,h:rh}}
function pxAt(reg,ax,ay){var lx=ax-reg.x0,ly=ay-reg.y0;if(lx<0||ly<0||lx>=reg.w||ly>=reg.h)return null;var i=(ly*reg.w+lx)<<2;return[reg.d[i],reg.d[i+1],reg.d[i+2]]}

/* ===== BUILD CARDS ===== */
Object.entries(RX).forEach(function(entry){
  var k=entry[0],rx=entry[1];var dfL=rx.df===180?'180\u00B0 x2':'360\u00B0';
  var html='<div class="gh"><div><div class="sn" style="color:'+rx.accent+'"><i class="fas fa-broadcast-tower" style="margin-right:3px"></i>'+rx.name+'<span class="pxd off" id="pxd-'+k+'"></span></div><div class="sl">'+rx.lat+'N '+rx.lng+'E | '+dfL+'</div></div><div style="display:flex;align-items:center;gap:4px"><button class="tb" id="dl-'+k+'" title="Download image" style="padding:2px 4px;background:none;border:1px solid '+rx.accent+'33;color:'+rx.accent+'"><i class="fas fa-download"></i></button><span class="db" style="background:'+rx.accent+'22;color:'+rx.accent+'">'+rx.df+'\u00B0</span></div></div>';
  html+='<div class="sw" data-rx="'+k+'"><img id="img-'+k+'" src="'+rx.url+'" alt="'+rx.name+'"/>';
  html+='<canvas id="grd-'+k+'" class="gov"></canvas><div class="sca"></div>';
  html+='<div id="sc-'+k+'" class="sig-circ" style="display:none;width:20px;height:20px;border:2px solid '+rx.accent+';color:'+rx.accent+'"><div class="sig-circ-inner" style="background:'+rx.accent+'"></div></div>';
  html+='<div id="tl-'+k+'" class="tline" style="display:none"><div class="tline-inner"></div><div class="tline-lbl" style="color:'+rx.accent+'"></div></div></div>';
  html+='<div class="gc2"><span class="lb">BRG</span><input type="number" class="bi" id="brg-'+k+'" min="0" max="360" placeholder="deg"/>';
  html+='<span class="lb">OFF</span><button class="off-btn" id="offm-'+k+'">-</button><span style="font-size:8px;min-width:20px;text-align:center" id="offv-'+k+'">0</span><button class="off-btn" id="offp-'+k+'">+</button>';

function updateMap(){if(!lmap)return;Object.values(mLay).forEach(function(a){a.forEach(function(l){lmap.removeLayer(l)})});mLay={};Object.values(mInt).forEach(function(l){lmap.removeLayer(l)});mInt={};sigs.forEach(function(sig){var layers=[],lines=[];Object.keys(RX).forEach(function(k){var b=sig.bearings[k];if(b===undefined||b===null||isNaN(b))return;var rx=RX[k],col=sig.colors[k]||sig.color;var pts=bearLine(rx.lat,rx.lng,b,BLEN);lines.push(pts);var pl=L.polyline(pts,{color:col,weight:2.5,opacity:.8,dashArray:'10 5'}).addTo(lmap);layers.push(pl);if(rx.df===180){var ab=(b+180)%360;var pl2=L.polyline(bearLine(rx.lat,rx.lng,ab,BLEN),{color:col,weight:1.5,opacity:.3,dashArray:'4 8'}).addTo(lmap);layers.push(pl2)}});if(lines.length>=2){for(var i=0;i<lines.length-1;i++)for(var j=i+1;j<lines.length;j++){var pt=findInt(lines[i],lines[j]);if(pt){var mk=L.marker(pt,{icon:L.divIcon({html:'<div style="width:12px;height:12px;background:'+sig.color+';border:2px solid #fff;border-radius:50%;box-shadow:0 0 10px '+sig.color+'"></div>',className:'',iconSize:[12,12],iconAnchor:[6,6]})}).addTo(lmap);layers.push(mk);mInt[sig.id]=mk}}}mLay[sig.id]=layers})}
function initGlobe(){if(g3ok)return;g3ok=true;try{var el=$('map3d'),w=el.clientWidth||600,h=el.clientHeight||500;sc3=new THREE.Scene();sc3.background=new THREE.Color(0x060a10);cam3=new THREE.PerspectiveCamera(45,w/Math.max(h,1),0.1,1000);cam3.position.set(0,4,14);ren3=new THREE.WebGLRenderer({antialias:true});ren3.setSize(w,h);el.appendChild(ren3.domElement);ctl3=new OrbitControls(cam3,ren3.domElement);var geo=new THREE.SphereGeometry(5,32,32);var mat=new THREE.MeshBasicMaterial({color:0x0b1018,wireframe:true,transparent:true,opacity:0.2});var globe=new THREE.Mesh(geo,mat);sc3.add(globe);function animate(){requestAnimationFrame(animate);ctl3.update();ren3.render(sc3,cam3)}animate();toast('3D Globe initialized','s')}catch(e){toast('3D Globe error: '+e.message,'e')}}
 $('b2d').addEventListener('click',function(){vw='2d';$('map2d').style.display='block';$('map3d').style.display='none';$('b2d').classList.add('on');$('b3d').classList.remove('on');if(lmap)setTimeout(function(){lmap.invalidateSize()},100)});
 $('b3d').addEventListener('click',function(){vw='3d';$('map2d').style.display='none';$('map3d').style.display='block';$('b3d').classList.add('on');$('b2d').classList.remove('on');initGlobe()});
 $('bclr').addEventListener('click',function(){sigs=[];updateMap();renderSigList();toast('Cleared','i')});
